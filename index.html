<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디큐브 통합 관리 시스템</title>
    <!-- 시스템 코어 엔진 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 이미지 변환 엔진 로드 -->
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: "Pretendard", sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; font-size: 18px; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-animate { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        /* 타임테이블 물리적 높이 보정 */
        .time-slot { height: 100px; border-bottom: 1px solid #f1f5f9; }
        
        /* 캔버스 출력용 고정 비율 및 해상도 최적화 */
        .export-area { 
            width: 1700px !important; 
            min-width: 1700px !important; 
            background: white !important;
            padding: 60px !important;
            display: flex !important;
            flex-direction: column !important;
        }
        
        /* 시간 열 너비 축소 (약 40% 감소) 및 그리드 비율 조정 */
        .grid-layout {
            display: grid !important;
            grid-template-columns: 0.6fr repeat(7, 1fr) !important;
        }

        .schedule-block { 
            word-break: keep-all; 
            overflow: visible !important;
            line-height: 1.4; 
        }
    </style>
</head>
<body class="overflow-hidden text-slate-900 font-medium">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
            const iconData = lucide.icons[pascalName] || lucide.icons[name];
            if (!iconData) return null;
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconData.map(item => `<${item[0]} ${Object.entries(item[1]).map(([k, v]) => `${k}="${v}"`).join(' ')}></${item[0]}>`).join('') }}
                />
            );
        };

        const DAYS = ['월', '화', '수', '목', '금', '토', '일'];
        const START_HOUR = 7;
        const END_HOUR = 24;
        const SLOT_HEIGHT = 100; 
        const TOTAL_MINUTES = (END_HOUR - START_HOUR + 1) * 60;
        const DEFAULT_COLORS = ['#E59A9A', '#E5B981', '#DEE08C', '#A8D99C', '#8CCEDB', '#89AED9', '#A59BD9', '#D9A9D9', '#C2CDC9'];

        const App = () => {
            const captureAreaRef = useRef(null);
            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('studycube_v16_data');
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: '신규 학생', schedules: [], isDeleted: false }];
            });

            const [selectedId, setSelectedId] = useState(null);
            const [activeMenuId, setActiveMenuId] = useState(null); 
            const [isEditMode, setIsEditMode] = useState(false);
            const [showTrash, setShowTrash] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterTitle, setFilterTitle] = useState('');
            const [filterTag, setFilterTag] = useState('');

            const [studentModal, setStudentModal] = useState({ open: false, editId: null, name: '' });
            const [scheduleModal, setScheduleModal] = useState({ open: false, editId: null });
            const [detailModal, setDetailModal] = useState({ open: false, item: null });
            
            const [tags, setTags] = useState(['인강', '자습', '학원', '수업', '과외']);
            const [newTagInput, setNewTagInput] = useState('');
            const [customColors, setCustomColors] = useState([]);
            const [tempColor, setTempColor] = useState('#3b82f6');

            const [sForm, setSForm] = useState({ title: '', days: [], startH: '09', startM: '00', endH: '10', endM: '00', tags: ['자습'], memo: '', color: DEFAULT_COLORS[0] });

            useEffect(() => {
                localStorage.setItem('studycube_v16_data', JSON.stringify(students));
            }, [students]);

            const current = useMemo(() => students.find(s => s.id === selectedId), [students, selectedId]);
            const filteredSchedules = useMemo(() => {
                if (!current) return [];
                return current.schedules.filter(s => 
                    s.title.toLowerCase().includes(filterTitle.toLowerCase()) && 
                    (filterTag === '' || (s.tags && s.tags.some(t => t.toLowerCase().includes(filterTag.toLowerCase()))))
                );
            }, [current, filterTitle, filterTag]);

            const statistics = useMemo(() => {
                const total = filteredSchedules.reduce((acc, s) => {
                    const duration = (parseInt(s.endH)*60+parseInt(s.endM)) - (parseInt(s.startH)*60+parseInt(s.startM));
                    return acc + (duration * s.days.length);
                }, 0);
                return { total, avg: Math.round(total / 7) };
            }, [filteredSchedules]);

            // 이미지 출력 엔진 최적화
            const handleExport = () => {
                if (!captureAreaRef.current || !current) return;
                html2canvas(captureAreaRef.current, {
                    backgroundColor: "#ffffff",
                    scale: 3, 
                    useCORS: true,
                    allowTaint: true,
                    onclone: (clonedDoc) => {
                        const area = clonedDoc.querySelector('.export-area');
                        if (area) {
                            area.style.height = 'auto';
                            area.style.overflow = 'visible';
                            const items = area.querySelectorAll('.schedule-block');
                            items.forEach(el => el.style.overflow = 'visible');
                        }
                    }
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${current.name}_주간계획표_스터디큐브.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                });
            };

            const handleSaveStudent = () => {
                if (!studentModal.name.trim()) return;
                if (studentModal.editId) {
                    setStudents(prev => prev.map(s => s.id === studentModal.editId ? { ...s, name: studentModal.name } : s));
                } else {
                    setStudents(prev => [...prev, { id: Date.now(), name: studentModal.name, schedules: [], isDeleted: false }]);
                }
                setStudentModal({ open: false, editId: null, name: '' });
                setActiveMenuId(null);
            };

            const openScheduleModal = (item = null) => {
                if (item) {
                    setSForm({ ...item, tags: item.tags || [] });
                    setScheduleModal({ open: true, editId: item.id });
                } else {
                    setSForm({ title: '', days: [], startH: '09', startM: '00', endH: '10', endM: '00', tags: [tags[0]], memo: '', color: DEFAULT_COLORS[0] });
                    setScheduleModal({ open: true, editId: null });
                }
            };

            const handleSaveSchedule = () => {
                if (!sForm.title || sForm.days.length === 0) return;
                const start = parseInt(sForm.startH)*60 + parseInt(sForm.startM);
                const end = parseInt(sForm.endH)*60 + parseInt(sForm.endM);
                if (end <= start) { alert("종료 시간은 시작보다 늦어야 합니다."); return; }

                const newSchedules = scheduleModal.editId 
                    ? current.schedules.map(s => s.id === scheduleModal.editId ? { ...sForm, id: s.id } : s)
                    : [...current.schedules, { ...sForm, id: Date.now() }];
                
                setStudents(prev => prev.map(s => s.id === selectedId ? { ...s, schedules: newSchedules } : s));
                setScheduleModal({ open: false, editId: null });
            };

            const toggleTag = (t) => {
                const currentTags = sForm.tags || [];
                if (currentTags.includes(t)) {
                    setSForm({ ...sForm, tags: currentTags.filter(tag => tag !== t) });
                } else {
                    setSForm({ ...sForm, tags: [...currentTags, t] });
                }
            };

            const formatTime = (h, m) => `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

            return (
                <div className="flex h-screen w-full bg-slate-50 overflow-hidden font-sans" onClick={() => setActiveMenuId(null)}>
                    {/* 사이드바 */}
                    <aside className="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0 z-30 shadow-md">
                        <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                            <h1 className="text-2xl font-black italic tracking-tighter uppercase text-slate-800 mb-6 text-center">Study Cube</h1>
                            <button onClick={() => setStudentModal({ open: true, editId: null, name: '' })} className="w-full bg-blue-600 py-4 rounded-2xl font-black text-lg text-white shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                                <Icon name="user-plus" size={24} /> 학생 등록
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                            <div className="relative mb-6">
                                <Icon name="search" size={20} className="absolute left-4 top-4 text-slate-300" />
                                <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="학생 검색..." className="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 pl-12 pr-4 text-lg focus:ring-2 focus:ring-blue-400 outline-none font-bold shadow-inner" />
                            </div>
                            {students.filter(s => s.isDeleted === showTrash && s.name.includes(searchQuery)).map(s => (
                                <div key={s.id} onClick={() => setSelectedId(s.id)} className={`group p-6 rounded-2xl cursor-pointer border-2 flex items-center justify-between relative transition-all ${selectedId === s.id ? 'bg-blue-50 border-blue-400 shadow-md scale-[1.02]' : 'bg-white border-transparent hover:border-slate-200 hover:bg-slate-50'}`}>
                                    <div className="font-black text-xl truncate flex-1 text-slate-800">{s.name}</div>
                                    <button onClick={(e) => { e.stopPropagation(); setActiveMenuId(activeMenuId === s.id ? null : s.id); }} className="p-2 text-slate-300 hover:text-slate-600 transition-colors"><Icon name="more-vertical" size={24} /></button>
                                    {activeMenuId === s.id && (
                                        <div className="absolute right-0 top-14 bg-white border border-slate-100 rounded-2xl shadow-2xl z-[100] p-2 w-44 animate-in fade-in zoom-in duration-150">
                                            <button onClick={(e) => { e.stopPropagation(); setStudentModal({ open: true, editId: s.id, name: s.name }); }} className="w-full flex items-center gap-3 px-4 py-4 text-base font-bold text-slate-600 hover:bg-slate-50 rounded-xl transition-colors italic">이름 변경</button>
                                            <button onClick={(e) => { e.stopPropagation(); setStudents(prev => prev.map(x => x.id === s.id ? {...x, isDeleted: true} : x)); }} className="w-full flex items-center gap-3 px-4 py-4 text-base font-bold text-red-500 hover:bg-red-50 rounded-xl transition-colors italic">데이터 삭제</button>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {selectedId && current && (
                            <div className="h-[40%] border-t border-slate-200 flex flex-col bg-white overflow-hidden shadow-inner">
                                <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="text-base font-black text-slate-500 uppercase tracking-widest">일정 목록</h3>
                                    <span className="text-sm font-black text-blue-600 bg-blue-100 px-3 py-1 rounded-full">{filteredSchedules.length} UNITS</span>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                    {filteredSchedules.map(sched => (
                                        <div key={sched.id} onClick={() => setDetailModal({ open: true, item: sched })} className="p-5 rounded-2xl border border-slate-100 hover:border-blue-200 cursor-pointer group bg-slate-50/30 transition-all shadow-sm">
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className="w-4 h-4 rounded-full shadow-sm" style={{ backgroundColor: sched.color }}></div>
                                                <div className="font-black text-lg text-slate-800 truncate">{sched.title}</div>
                                            </div>
                                            <div className="flex flex-wrap gap-1.5 pl-7">
                                                {(sched.tags || []).map(tag => (
                                                    <span key={tag} className="text-xs font-black text-blue-500 bg-blue-50 px-2 py-0.5 rounded-md">{tag}</span>
                                                ))}
                                                <span className="bg-slate-100 px-2 py-0.5 rounded text-xs font-black text-slate-500 ml-auto">{sched.startH}:{sched.startM}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </aside>

                    {/* 메인 캔버스 */}
                    <main className="flex-1 flex flex-col relative bg-white overflow-hidden">
                        {current ? (
                            <>
                                <header className="h-24 border-b border-slate-100 flex items-center justify-between px-10 shrink-0 bg-white z-10 shadow-sm">
                                    <div className="flex items-center gap-6">
                                        <div className="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl border border-slate-100 shadow-inner">
                                            <input type="text" placeholder="제목 필터" value={filterTitle} onChange={e => setFilterTitle(e.target.value)} className="bg-transparent px-4 py-2 text-lg font-black outline-none border-r border-slate-200 w-48" />
                                            <input type="text" placeholder="태그 필터" value={filterTag} onChange={e => setFilterTag(e.target.value)} className="bg-transparent px-4 py-2 text-lg font-black outline-none w-48" />
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-800 tracking-tighter uppercase italic">{current.name} 시간표</h2>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <button onClick={handleExport} className="flex items-center gap-3 px-10 py-4 bg-emerald-500 text-white rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all hover:bg-emerald-600">
                                            <Icon name="download" size={24} /> 이미지 저장
                                        </button>
                                        <button onClick={() => setIsEditMode(!isEditMode)} className={`flex items-center gap-3 px-10 py-4 rounded-2xl font-black text-lg transition-all shadow-xl ${isEditMode ? 'bg-slate-900 text-white shadow-slate-300' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                            <Icon name={isEditMode ? "check" : "edit-3"} size={24} /> {isEditMode ? '저장 종료' : '일정 편집'}
                                        </button>
                                    </div>
                                </header>
                                
                                <div className="flex-1 overflow-auto bg-slate-50/50 p-12 custom-scrollbar">
                                    <div ref={captureAreaRef} className="export-area bg-white p-16 rounded-[4rem] shadow-2xl border border-slate-100 mx-auto">
                                        
                                        <div className="mb-12 border-b-4 border-slate-900 pb-10 flex justify-between items-end">
                                            <div>
                                                <h1 className="text-4xl font-black text-slate-900 tracking-tight italic uppercase">{current.name} 주간 계획표</h1>
                                            </div>
                                            <div className="text-right">
                                                <span className="text-slate-400 font-black text-xl uppercase tracking-widest leading-none">| 스터디큐브</span>
                                            </div>
                                        </div>

                                        <div className="flex gap-12">
                                            {/* 리포트 패널 - 자간 및 여백 최적화 */}
                                            <div className="w-80 shrink-0 space-y-10">
                                                <div className="bg-slate-900 text-white p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
                                                    <h3 className="text-[14px] font-black uppercase tracking-[0.3em] opacity-30 mb-10">CORE REPORT</h3>
                                                    <div className="space-y-12">
                                                        <div className="flex flex-col">
                                                            <p className="text-[12px] font-black opacity-40 uppercase mb-4">Weekly Focus</p>
                                                            <div className="flex items-baseline w-full font-black">
                                                                <span className="text-6xl tracking-tighter">{Math.floor(statistics.total/60)}</span>
                                                                <span className="text-2xl opacity-30 italic ml-6 mr-12">H</span>
                                                                <span className="text-6xl tracking-tighter">{statistics.total%60}</span>
                                                                <span className="text-2xl opacity-30 italic ml-6">M</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col">
                                                            <p className="text-[12px] font-black opacity-40 uppercase mb-4">Daily Average</p>
                                                            <div className="flex items-baseline w-full text-blue-400 font-black">
                                                                <span className="text-6xl tracking-tighter">{Math.floor(statistics.avg/60)}</span>
                                                                <span className="text-2xl opacity-30 italic ml-6 mr-12">H</span>
                                                                <span className="text-6xl tracking-tighter">{statistics.avg%60}</span>
                                                                <span className="text-2xl opacity-30 italic ml-6">M</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="space-y-5">
                                                    <h3 className="text-[14px] font-black text-slate-400 uppercase tracking-widest ml-1">INDEXING</h3>
                                                    {filteredSchedules.map(sched => (
                                                        <div key={sched.id} className="p-6 rounded-[2rem] border-2 border-slate-50 flex items-start gap-5 bg-white shadow-sm transition-transform hover:translate-x-1">
                                                            <div className="w-3 h-16 rounded-full shrink-0" style={{ backgroundColor: sched.color }}></div>
                                                            <div className="overflow-hidden flex-1 pt-1">
                                                                <p className="font-black text-xl text-slate-800 truncate mb-1.5">{sched.title}</p>
                                                                <div className="flex flex-wrap gap-1.5">
                                                                    {(sched.tags || []).map(tag => (
                                                                        <span key={tag} className="text-xs font-black text-slate-900 bg-slate-100 px-2 py-0.5 rounded">{tag}</span>
                                                                    ))}
                                                                    <span className="text-xs font-black text-slate-400 uppercase ml-auto">{sched.startH}:{sched.startM}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* 타임라인 - 시간 열 너비 축소 및 가로 폭 확장 */}
                                            <div className="flex-1 grid-layout grid divide-x-2 divide-slate-100 border-2 border-slate-100 rounded-[3.5rem] overflow-hidden shadow-2xl bg-white">
                                                <div className="bg-slate-50/50 flex flex-col text-center">
                                                    <div className="h-20 border-b-4 border-slate-900 flex items-center justify-center text-[14px] font-black text-slate-900 uppercase bg-white italic tracking-tighter">TIME</div>
                                                    {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                                                        <div key={i} className="time-slot flex items-start justify-center pt-6 text-[18px] font-black text-slate-300">
                                                            {START_HOUR + i < 24 ? START_HOUR + i : START_HOUR + i - 24}
                                                        </div>
                                                    ))}
                                                </div>
                                                {DAYS.map(day => (
                                                    <div key={day} className="flex flex-col relative group min-w-[160px]">
                                                        <div className="h-20 border-b-4 border-slate-900 flex items-center justify-center text-xl font-black text-slate-900 bg-white uppercase tracking-tighter">{day}요일</div>
                                                        <div className="flex-1 relative bg-white/40">
                                                            {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                                                                <div key={i} className="time-slot border-dotted border-b border-slate-100"></div>
                                                            ))}
                                                            {filteredSchedules.filter(a => a.days.includes(day)).map(a => {
                                                                const start = (parseInt(a.startH) * 60 + parseInt(a.startM)) - (START_HOUR * 60);
                                                                const dur = (parseInt(a.endH) * 60 + parseInt(a.endM)) - (parseInt(a.startH) * 60 + parseInt(a.startM));
                                                                const totalH = (END_HOUR - START_HOUR + 1) * SLOT_HEIGHT;
                                                                const topPos = (start / TOTAL_MINUTES) * totalH;
                                                                const blockH = (dur / TOTAL_MINUTES) * totalH;
                                                                
                                                                return (
                                                                    <div key={a.id} onClick={() => isEditMode ? openScheduleModal(a) : setDetailModal({ open: true, item: a })} 
                                                                        className={`absolute left-1.5 right-1.5 rounded-3xl p-6 text-slate-900 shadow-xl border border-black/5 flex flex-col justify-start overflow-hidden transition-all hover:scale-[1.04] hover:z-20 cursor-pointer ${isEditMode ? 'ring-4 ring-blue-500/40 ring-offset-2' : ''}`}
                                                                        style={{ top: `${topPos}px`, height: `${blockH}px`, backgroundColor: a.color }}>
                                                                        
                                                                        <div className="flex flex-col h-full pointer-events-none schedule-block">
                                                                            <div className="flex justify-between items-start mb-3">
                                                                                <span className="truncate leading-tight font-black text-[18px] uppercase tracking-tighter">{a.title}</span>
                                                                            </div>
                                                                            
                                                                            {blockH > 65 && (
                                                                                <div className="text-[14px] font-black opacity-80 tracking-tighter mb-3 flex items-center gap-2">
                                                                                    <Icon name="clock" size={14} className="opacity-40" />
                                                                                    {formatTime(a.startH, a.startM)} → {formatTime(a.endH, a.endM)}
                                                                                </div>
                                                                            )}

                                                                            {/* 태그 영역 - 시간 하단 배치 */}
                                                                            {blockH > 90 && a.tags && a.tags.length > 0 && (
                                                                                <div className="flex flex-wrap gap-1.5 mb-3">
                                                                                    {a.tags.map(tag => (
                                                                                        <span key={tag} className="bg-white/70 px-3 py-1 rounded-xl text-[12px] font-black uppercase shrink-0 border border-black/5 shadow-sm text-slate-800">{tag}</span>
                                                                                    ))}
                                                                                </div>
                                                                            )}
                                                                            
                                                                            {blockH > 150 && a.memo && (
                                                                                <div className="text-[14px] font-bold leading-relaxed opacity-60 border-t border-black/10 pt-4 truncate-5">
                                                                                    {a.memo}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {isEditMode && (
                                    <button onClick={() => openScheduleModal()} className="absolute bottom-12 right-12 w-28 h-28 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all z-20 hover:bg-blue-700 shadow-blue-500/40">
                                        <Icon name="plus" size={56} />
                                    </button>
                                )}
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-300 bg-slate-50">
                                <div className="w-56 h-56 bg-white rounded-[5rem] flex items-center justify-center shadow-inner mb-12 border border-slate-100"><Icon name="users" size={100} className="opacity-20 text-slate-400" /></div>
                                <p className="font-black text-3xl text-slate-400 uppercase tracking-widest italic">학생을 선택하여 일정을 로드하십시오</p>
                            </div>
                        )}
                    </main>

                    {/* 상세 활동 정보 모달 */}
                    {detailModal.open && detailModal.item && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-xl flex items-center justify-center z-[150] p-10">
                            <div className="bg-white rounded-[4rem] w-full max-w-xl shadow-2xl overflow-hidden modal-animate border border-white/20">
                                <div className="h-52 relative" style={{ backgroundColor: detailModal.item.color }}>
                                    <button onClick={() => setDetailModal({ open: false, item: null })} className="absolute top-10 right-10 p-4 bg-black/20 text-white rounded-full transition-all hover:bg-black/40"><Icon name="x" size={32} /></button>
                                    <div className="absolute -bottom-10 left-16 bg-white p-7 rounded-[2.5rem] shadow-2xl border border-slate-50"><Icon name="bookmark" className="text-slate-800" size={44} /></div>
                                </div>
                                <div className="p-16 pt-20 space-y-12 text-slate-800">
                                    <div>
                                        <h3 className="text-5xl font-black mb-5 italic tracking-tighter text-slate-900">{detailModal.item.title}</h3>
                                        <div className="flex flex-wrap gap-4">
                                            {(detailModal.item.tags || []).map(tag => (
                                                <span key={tag} className="px-6 py-2.5 bg-slate-900 text-white rounded-2xl text-[16px] font-black uppercase tracking-widest">{tag}</span>
                                            ))}
                                            {detailModal.item.days.map(d => <span key={d} className="px-6 py-2.5 bg-slate-100 rounded-2xl text-[16px] font-black text-slate-600">{d}요일</span>)}
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-10 rounded-[3rem] border-2 border-slate-100 shadow-inner space-y-8">
                                        <div className="flex items-center gap-8">
                                            <div className="w-16 h-16 bg-white rounded-3xl flex items-center justify-center shadow-md text-slate-400 border border-slate-100"><Icon name="clock" size={32} /></div>
                                            <div className="text-4xl font-black italic tracking-tighter text-slate-800">{formatTime(detailModal.item.startH, detailModal.item.startM)} → {formatTime(detailModal.item.endH, detailModal.item.endM)}</div>
                                        </div>
                                        {detailModal.item.memo && (
                                            <div className="flex gap-8 pt-8 border-t-2 border-slate-200/50">
                                                <div className="w-16 h-16 bg-white rounded-3xl flex items-center justify-center shadow-md text-slate-400 shrink-0 border border-slate-100"><Icon name="file-text" size={32} /></div>
                                                <p className="text-2xl font-bold text-slate-600 leading-relaxed pt-2">{detailModal.item.memo}</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex gap-6">
                                        <button onClick={() => { openScheduleModal(detailModal.item); setDetailModal({ open: false, item: null }); setIsEditMode(true); }} className="flex-1 py-8 bg-slate-900 text-white rounded-[2.5rem] font-black shadow-2xl active:scale-95 transition-all text-xl uppercase tracking-tight">수정하기</button>
                                        <button onClick={() => { if(confirm("삭제하시겠습니까?")) { setStudents(prev => prev.map(s => s.id === selectedId ? {...s, schedules: s.schedules.filter(x => x.id !== detailModal.item.id)} : s)); setDetailModal({open: false, item: null}); } }} className="p-10 bg-red-50 text-red-500 rounded-[2.5rem] active:scale-95 transition-colors hover:bg-red-100 shadow-lg"><Icon name="trash-2" size={40} /></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 활동 수립 모달 */}
                    {scheduleModal.open && (
                        <div className="fixed inset-0 bg-slate-900/85 backdrop-blur-2xl flex items-center justify-center z-[200] p-10 font-sans">
                            <div className="bg-white p-16 rounded-[4.5rem] w-full max-w-6xl shadow-2xl border border-white/20 modal-animate max-h-[95vh] overflow-y-auto custom-scrollbar font-sans">
                                <div className="flex justify-between items-center mb-16 font-sans">
                                    <h3 className="text-5xl font-black text-slate-800 tracking-tighter uppercase italic">일정 수립 모드</h3>
                                    <button onClick={() => setScheduleModal({ open: false, editId: null })} className="text-slate-300 hover:text-slate-900 transition-colors bg-slate-50 p-5 rounded-full font-sans"><Icon name="x" size={48} /></button>
                                </div>
                                <div className="space-y-16 font-sans">
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 font-sans">
                                        <div className="space-y-8 font-sans">
                                            <label className="text-xl font-black text-slate-400 uppercase tracking-widest ml-3 italic">활동 제목</label>
                                            <input type="text" className="w-full border-4 border-slate-50 p-10 rounded-[3rem] font-black outline-none focus:border-blue-500 transition-all bg-slate-50 shadow-inner text-4xl" value={sForm.title} onChange={e => setSForm({...sForm, title: e.target.value})} placeholder="활동 이름" />
                                        </div>
                                        <div className="space-y-8 font-sans">
                                            <div className="flex justify-between items-center ml-3 font-sans"><label className="text-xl font-black text-slate-400 uppercase tracking-widest italic font-sans">태그 시스템 (중복 가능)</label>
                                                <div className="flex gap-4 bg-white p-2 px-6 rounded-2xl shadow-md border-2 border-slate-100 font-sans">
                                                    <input type="text" value={newTagInput} onChange={e => setNewTagInput(e.target.value)} placeholder="+ 추가" className="text-lg font-black outline-none w-32 font-sans" onKeyDown={e => e.key === 'Enter' && (setTags([...tags, newTagInput]), toggleTag(newTagInput), setNewTagInput(''))} />
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-4 p-10 bg-slate-50 rounded-[4rem] border-2 border-slate-100 min-h-[160px] shadow-inner font-sans">
                                                {tags.map(t => (
                                                    <button 
                                                        key={t} 
                                                        onClick={() => toggleTag(t)} 
                                                        className={`px-10 py-5 rounded-[2rem] text-xl font-black transition-all ${(sForm.tags || []).includes(t) ? 'bg-slate-900 text-white shadow-xl scale-110' : 'bg-white text-slate-400 border-2 border-slate-200 shadow-sm hover:border-slate-400'}`}
                                                    >
                                                        {t}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 font-sans">
                                        <div className="space-y-8 font-sans">
                                            <label className="text-xl font-black text-slate-400 uppercase ml-3 tracking-widest italic font-sans">요일 배치</label>
                                            <div className="flex gap-4 bg-slate-100 p-5 rounded-[3rem] shadow-inner">
                                                {DAYS.map(d => <button key={d} onClick={() => {
                                                    const curr = sForm.days;
                                                    setSForm({...sForm, days: curr.includes(d) ? curr.filter(x => x !== d) : [...curr, d]});
                                                }} className={`flex-1 py-8 rounded-[2rem] text-xl font-black transition-all ${sForm.days.includes(d) ? 'bg-white text-slate-900 shadow-xl scale-105' : 'text-slate-400 hover:text-slate-500'}`}>{d}</button>)}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-12 font-sans">
                                            <div className="space-y-8 font-sans"><label className="text-xl font-black text-slate-400 uppercase ml-3 tracking-widest italic font-sans">시작 (HH:MM)</label>
                                                <div className="flex items-center gap-6 bg-slate-50 p-8 rounded-[3rem] shadow-inner border-2 border-slate-100 font-sans">
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-5xl font-sans" value={sForm.startH} onChange={e => setSForm({...sForm, startH: e.target.value})} />
                                                    <span className="font-black text-slate-200 text-5xl font-sans">:</span>
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-5xl font-sans" value={sForm.startM} onChange={e => setSForm({...sForm, startM: e.target.value})} />
                                                </div>
                                            </div>
                                            <div className="space-y-8 font-sans"><label className="text-xl font-black text-slate-400 uppercase ml-3 tracking-widest italic font-sans">종료 (HH:MM)</label>
                                                <div className="flex items-center gap-6 bg-slate-50 p-8 rounded-[3rem] shadow-inner border-2 border-slate-100 font-sans">
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-5xl font-sans" value={sForm.endH} onChange={e => setSForm({...sForm, endH: e.target.value})} />
                                                    <span className="font-black text-slate-200 text-5xl font-sans">:</span>
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-5xl font-sans" value={sForm.endM} onChange={e => setSForm({...sForm, endM: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-20 flex gap-10 font-sans">
                                    <button onClick={() => setScheduleModal({ open: false, editId: null })} className="flex-1 py-10 font-black text-slate-400 uppercase tracking-[0.2em] text-2xl italic hover:text-slate-600 transition-colors">취소</button>
                                    <button onClick={handleSaveSchedule} className="flex-[3] py-10 bg-blue-600 text-white rounded-[4rem] font-black shadow-3xl shadow-blue-500/30 active:scale-95 transition-all text-4xl uppercase tracking-tighter italic">일정 확정</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 학생 정보 모달 */}
                    {studentModal.open && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-2xl flex items-center justify-center z-[300] p-10 font-sans">
                            <div className="bg-white p-20 rounded-[5rem] w-full max-w-xl shadow-2xl modal-animate border border-white/20 text-center font-sans">
                                <h3 className="text-5xl font-black mb-12 text-slate-800 tracking-tight uppercase italic font-sans">{studentModal.editId ? "이름 변경" : "학생 등록"}</h3>
                                <input type="text" value={studentModal.name} onChange={e => setStudentModal({...studentModal, name: e.target.value})} className="w-full border-4 border-slate-50 p-10 rounded-[3rem] outline-none focus:border-blue-500 font-black mb-16 transition-all bg-slate-50 shadow-inner text-5xl text-center font-sans" placeholder="이름" autoFocus onKeyDown={e => e.key === 'Enter' && handleSaveStudent()} />
                                <div className="flex gap-8 font-sans">
                                    <button onClick={() => setStudentModal({ open: false, editId: null, name: '' })} className="flex-1 py-10 font-bold text-slate-400 hover:text-slate-600 transition-colors uppercase italic text-2xl font-sans">취소</button>
                                    <button onClick={handleSaveStudent} className="flex-[2] py-10 bg-slate-900 text-white rounded-[3rem] font-black shadow-2xl active:scale-95 transition-all text-4xl uppercase tracking-tight font-sans">확인</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
