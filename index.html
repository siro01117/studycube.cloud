<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디큐브 통합 관리 시스템</title>
    <!-- 시스템 코어 엔진 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 이미지 변환 엔진 로드 -->
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: "Pretendard", sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; font-size: 16px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-animate { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        /* 타임테이블 물리적 높이 보정 */
        .time-slot { height: 95px; border-bottom: 1px solid #f1f5f9; }
        
        /* 캔버스 출력용 고정 비율 및 해상도 최적화 */
        .export-area { width: 1400px !important; min-width: 1400px !important; }
        .schedule-block { word-break: break-all; line-height: 1.3; }
        
        /* 전체적인 텍스트 강조 */
        .text-heavy { font-weight: 800; }
    </style>
</head>
<body class="overflow-hidden text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 아이콘 렌더링 엔진 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
            const iconData = lucide.icons[pascalName] || lucide.icons[name];
            
            if (!iconData) return null;
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconData.map(item => `<${item[0]} ${Object.entries(item[1]).map(([k, v]) => `${k}="${v}"`).join(' ')}></${item[0]}>`).join('') }}
                />
            );
        };

        const DAYS = ['월', '화', '수', '목', '금', '토', '일'];
        const START_HOUR = 7;
        const END_HOUR = 24;
        const SLOT_HEIGHT = 95; 
        const TOTAL_MINUTES = (END_HOUR - START_HOUR + 1) * 60;
        const DEFAULT_COLORS = ['#E59A9A', '#E5B981', '#DEE08C', '#A8D99C', '#8CCEDB', '#89AED9', '#A59BD9', '#D9A9D9', '#C2CDC9'];

        const App = () => {
            const captureAreaRef = useRef(null);

            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('studycube_v15_data');
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: '신규 학생', schedules: [], isDeleted: false }];
            });

            const [selectedId, setSelectedId] = useState(null);
            const [activeMenuId, setActiveMenuId] = useState(null); 
            const [isEditMode, setIsEditMode] = useState(false);
            const [showTrash, setShowTrash] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterTitle, setFilterTitle] = useState('');
            const [filterTag, setFilterTag] = useState('');

            const [studentModal, setStudentModal] = useState({ open: false, editId: null, name: '' });
            const [scheduleModal, setScheduleModal] = useState({ open: false, editId: null });
            const [detailModal, setDetailModal] = useState({ open: false, item: null });
            
            const [tags, setTags] = useState(['인강', '자습', '학원', '수업', '과외']);
            const [newTagInput, setNewTagInput] = useState('');
            const [customColors, setCustomColors] = useState([]);
            const [tempColor, setTempColor] = useState('#3b82f6');

            const [sForm, setSForm] = useState({ title: '', days: [], startH: '09', startM: '00', endH: '10', endM: '00', tag: '자습', memo: '', color: DEFAULT_COLORS[0] });

            useEffect(() => {
                localStorage.setItem('studycube_v15_data', JSON.stringify(students));
            }, [students]);

            const current = useMemo(() => students.find(s => s.id === selectedId), [students, selectedId]);
            const filteredSchedules = useMemo(() => {
                if (!current) return [];
                return current.schedules.filter(s => 
                    s.title.toLowerCase().includes(filterTitle.toLowerCase()) && 
                    s.tag.toLowerCase().includes(filterTag.toLowerCase())
                );
            }, [current, filterTitle, filterTag]);

            const statistics = useMemo(() => {
                const total = filteredSchedules.reduce((acc, s) => {
                    const dur = (parseInt(s.endH)*60+parseInt(s.endM)) - (parseInt(s.startH)*60+parseInt(s.startM));
                    return acc + (dur * s.days.length);
                }, 0);
                return { total, avg: Math.round(total / 7) };
            }, [filteredSchedules]);

            const handleExport = () => {
                if (!captureAreaRef.current || !current) return;
                html2canvas(captureAreaRef.current, {
                    backgroundColor: "#ffffff",
                    scale: 3, 
                    useCORS: true,
                    scrollX: 0,
                    scrollY: -window.scrollY,
                    windowWidth: 1500
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${current.name}_주간계획표_스터디큐브.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            };

            const handleSaveStudent = () => {
                if (!studentModal.name.trim()) return;
                if (studentModal.editId) {
                    setStudents(prev => prev.map(s => s.id === studentModal.editId ? { ...s, name: studentModal.name } : s));
                } else {
                    setStudents(prev => [...prev, { id: Date.now(), name: studentModal.name, schedules: [], isDeleted: false }]);
                }
                setStudentModal({ open: false, editId: null, name: '' });
                setActiveMenuId(null);
            };

            const formatTime = (h, m) => `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

            return (
                <div className="flex h-screen w-full bg-slate-50 overflow-hidden" onClick={() => setActiveMenuId(null)}>
                    {/* 사이드바 - 가로 폭 최적화 */}
                    <aside className="w-60 bg-white border-r border-slate-200 flex flex-col shrink-0 z-30 shadow-sm">
                        <div className="p-5 border-b border-slate-100 bg-slate-50/50">
                            <h1 className="text-base font-black italic tracking-tighter uppercase text-slate-800 mb-4 text-center">Study Cube</h1>
                            <button onClick={() => setStudentModal({ open: true, editId: null, name: '' })} className="w-full bg-blue-600 py-3 rounded-xl font-bold text-xs text-white shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                <Icon name="user-plus" size={16} /> 학생 등록
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-3 space-y-1.5 custom-scrollbar">
                            <div className="relative mb-4">
                                <Icon name="search" size={14} className="absolute left-3 top-2.5 text-slate-300" />
                                <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="검색..." className="w-full bg-slate-50 border border-slate-100 rounded-lg py-2 pl-9 pr-3 text-xs focus:ring-1 focus:ring-blue-400 outline-none font-bold" />
                            </div>
                            {students.filter(s => s.isDeleted === showTrash && s.name.includes(searchQuery)).map(s => (
                                <div key={s.id} onClick={() => setSelectedId(s.id)} className={`group p-3.5 rounded-xl cursor-pointer border flex items-center justify-between relative transition-all ${selectedId === s.id ? 'bg-blue-50 border-blue-200 ring-1 ring-blue-100 shadow-sm' : 'bg-white border-slate-100 hover:border-slate-200'}`}>
                                    <div className="font-bold text-sm truncate flex-1">{s.name}</div>
                                    <button onClick={(e) => { e.stopPropagation(); setActiveMenuId(activeMenuId === s.id ? null : s.id); }} className="p-1 text-slate-300 hover:text-slate-500"><Icon name="more-vertical" size={14} /></button>
                                    {activeMenuId === s.id && (
                                        <div className="absolute right-0 top-10 bg-white border border-slate-100 rounded-xl shadow-2xl z-[100] p-1.5 w-32 animate-in fade-in zoom-in duration-150">
                                            <button onClick={(e) => { e.stopPropagation(); setStudentModal({ open: true, editId: s.id, name: s.name }); }} className="w-full flex items-center gap-2 px-2 py-2 text-[11px] font-bold text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">이름 변경</button>
                                            <button onClick={(e) => { e.stopPropagation(); setStudents(prev => prev.map(x => x.id === s.id ? {...x, isDeleted: true} : x)); }} className="w-full flex items-center gap-2 px-2 py-2 text-[11px] font-bold text-red-500 hover:bg-red-50 rounded-lg transition-colors">데이터 삭제</button>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {selectedId && current && (
                            <div className="h-1/3 border-t border-slate-200 flex flex-col bg-white overflow-hidden">
                                <div className="p-3 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="text-[11px] font-black text-slate-500 uppercase tracking-widest">전체 일정 목록</h3>
                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">{filteredSchedules.length}</span>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-1.5 custom-scrollbar">
                                    {filteredSchedules.map(sched => (
                                        <div key={sched.id} onClick={() => setDetailModal({ open: true, item: sched })} className="p-2.5 rounded-lg border border-slate-50 hover:border-slate-100 cursor-pointer group bg-slate-50/30">
                                            <div className="flex items-center gap-2 mb-1.5">
                                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: sched.color }}></div>
                                                <div className="font-bold text-[12px] text-slate-700 truncate">{sched.title}</div>
                                            </div>
                                            <div className="flex justify-between text-[10px] font-bold text-slate-400">
                                                <span className="text-slate-600">{sched.tag}</span>
                                                <span>{sched.startH}:{sched.startM}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </aside>

                    {/* 메인 캔버스 */}
                    <main className="flex-1 flex flex-col relative bg-white overflow-hidden">
                        {current ? (
                            <>
                                <header className="h-20 border-b border-slate-100 flex items-center justify-between px-8 shrink-0 bg-white z-10 shadow-sm">
                                    <div className="flex items-center gap-4">
                                        <div className="flex items-center gap-2 bg-slate-50 p-1.5 rounded-xl border border-slate-100">
                                            <input type="text" placeholder="제목 필터" value={filterTitle} onChange={e => setFilterTitle(e.target.value)} className="bg-transparent px-3 py-1.5 text-[12px] font-black outline-none border-r border-slate-200 w-32" />
                                            <input type="text" placeholder="태그 필터" value={filterTag} onChange={e => setFilterTag(e.target.value)} className="bg-transparent px-3 py-1.5 text-[12px] font-black outline-none w-32" />
                                        </div>
                                        <h2 className="text-lg font-black text-slate-800 tracking-tighter uppercase italic">{current.name} 학생 대시보드</h2>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <button onClick={handleExport} className="flex items-center gap-2 px-6 py-3 bg-emerald-500 text-white rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">
                                            <Icon name="download" size={16} /> 이미지 저장
                                        </button>
                                        <button onClick={() => setIsEditMode(!isEditMode)} className={`flex items-center gap-2 px-8 py-3 rounded-2xl font-black text-sm transition-all shadow-md ${isEditMode ? 'bg-slate-900 text-white shadow-xl' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                            <Icon name={isEditMode ? "check" : "edit-3"} size={16} /> {isEditMode ? '저장 종료' : '일정 편집 시작'}
                                        </button>
                                    </div>
                                </header>
                                
                                <div className="flex-1 overflow-auto bg-slate-50/50 p-10 custom-scrollbar">
                                    <div ref={captureAreaRef} className="export-area bg-white p-12 rounded-[3.5rem] shadow-2xl border border-slate-200 mx-auto">
                                        
                                        <div className="mb-12 border-b-4 border-slate-900 pb-10 flex justify-between items-end">
                                            <div>
                                                <h1 className="text-6xl font-black text-slate-900 tracking-tighter uppercase italic">{current.name} 주간 계획표</h1>
                                                <p className="text-xl font-bold text-slate-400 mt-3 uppercase tracking-[0.25em]">WEEKLY OPERATION PROTOCOL</p>
                                            </div>
                                            <div className="text-right">
                                                <span className="text-slate-300 font-black text-lg uppercase tracking-widest leading-none">| 스터디큐브</span>
                                            </div>
                                        </div>

                                        <div className="flex gap-10">
                                            {/* 왼쪽 패널: 가로 폭 축소(w-60) 및 글씨 확대 */}
                                            <div className="w-60 shrink-0 space-y-8">
                                                <div className="bg-slate-900 text-white p-7 rounded-[2.5rem] shadow-xl">
                                                    <h3 className="text-[12px] font-black uppercase tracking-widest opacity-40 mb-6">REPORT</h3>
                                                    <div className="space-y-8">
                                                        <div>
                                                            <p className="text-[11px] font-black opacity-50 uppercase mb-2">Weekly Total</p>
                                                            <p className="text-4xl font-black tracking-tighter">{Math.floor(statistics.total/60)}<span className="text-xl mx-1 opacity-50">H</span>{statistics.total%60}<span className="text-xl opacity-50">M</span></p>
                                                        </div>
                                                        <div>
                                                            <p className="text-[11px] font-black opacity-50 uppercase mb-2">Average</p>
                                                            <p className="text-4xl font-black tracking-tighter text-blue-400">{Math.floor(statistics.avg/60)}<span className="text-xl mx-1 opacity-50">H</span>{statistics.avg%60}<span className="text-xl opacity-50">M</span></p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="space-y-4">
                                                    <h3 className="text-[12px] font-black text-slate-400 uppercase tracking-widest ml-1">INDEX</h3>
                                                    {filteredSchedules.map(sched => (
                                                        <div key={sched.id} className="p-5 rounded-3xl border border-slate-100 flex items-start gap-4 bg-white shadow-sm">
                                                            <div className="w-2.5 h-14 rounded-full shrink-0" style={{ backgroundColor: sched.color }}></div>
                                                            <div className="overflow-hidden flex-1 pt-1">
                                                                <p className="font-black text-[15px] text-slate-800 truncate mb-1.5">{sched.title}</p>
                                                                <p className="text-[11px] font-black text-slate-400 uppercase tracking-tighter">
                                                                    <span className="text-slate-900">{sched.tag}</span> | {sched.startH}:{sched.startM}
                                                                </p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* 오른쪽 타임라인: 가로 면적 확장 */}
                                            <div className="flex-1 grid grid-cols-8 divide-x divide-slate-100 border border-slate-100 rounded-[3rem] overflow-hidden shadow-2xl bg-white">
                                                <div className="bg-slate-50/50 flex flex-col text-center">
                                                    <div className="h-16 border-b-2 border-slate-900 flex items-center justify-center text-[11px] font-black text-slate-900 uppercase bg-white">TIME</div>
                                                    {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                                                        <div key={i} className="time-slot flex items-start justify-center pt-5 text-[12px] font-bold text-slate-300">
                                                            {START_HOUR + i < 24 ? START_HOUR + i : START_HOUR + i - 24}:00
                                                        </div>
                                                    ))}
                                                </div>
                                                {DAYS.map(day => (
                                                    <div key={day} className="flex flex-col relative group min-w-[130px]">
                                                        <div className="h-16 border-b-2 border-slate-900 flex items-center justify-center text-[15px] font-black text-slate-900 bg-white uppercase tracking-tighter">{day}요일</div>
                                                        <div className="flex-1 relative bg-white/40">
                                                            {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                                                                <div key={i} className="time-slot border-dotted border-b border-slate-100"></div>
                                                            ))}
                                                            {filteredSchedules.filter(a => a.days.includes(day)).map(a => {
                                                                const start = (parseInt(a.startH) * 60 + parseInt(a.startM)) - (START_HOUR * 60);
                                                                const dur = (parseInt(a.endH) * 60 + parseInt(a.endM)) - (parseInt(a.startH) * 60 + parseInt(a.startM));
                                                                const totalH = (END_HOUR - START_HOUR + 1) * SLOT_HEIGHT;
                                                                const topPos = (start / TOTAL_MINUTES) * totalH;
                                                                const blockH = (dur / TOTAL_MINUTES) * totalH;
                                                                
                                                                return (
                                                                    <div key={a.id} onClick={() => isEditMode ? openScheduleModal(a) : setDetailModal({ open: true, item: a })} 
                                                                        className={`absolute left-1 right-1 rounded-2xl p-4 text-slate-900 shadow-xl border border-black/5 flex flex-col justify-between overflow-hidden transition-all hover:scale-[1.04] hover:z-20 cursor-pointer ${isEditMode ? 'ring-4 ring-blue-500/30' : ''}`}
                                                                        style={{ top: `${topPos}px`, height: `${blockH}px`, backgroundColor: a.color }}>
                                                                        
                                                                        <div className="flex flex-col h-full pointer-events-none">
                                                                            <div className="flex justify-between items-start mb-2">
                                                                                <span className="truncate leading-tight font-black text-[13px] uppercase tracking-tighter">{a.title}</span>
                                                                                {blockH > 50 && <span className="bg-white/60 px-2 py-0.5 rounded-lg text-[9px] font-black uppercase shrink-0 border border-black/5">{a.tag}</span>}
                                                                            </div>
                                                                            
                                                                            {blockH > 65 && (
                                                                                <div className="text-[11px] font-black opacity-70 tracking-tighter mb-2">
                                                                                    {formatTime(a.startH, a.startM)} → {formatTime(a.endH, a.endM)}
                                                                                </div>
                                                                            )}
                                                                            
                                                                            {blockH > 110 && a.memo && (
                                                                                <div className="text-[11px] font-bold leading-relaxed opacity-60 border-t border-black/5 pt-2.5 truncate-4 schedule-block">
                                                                                    {a.memo}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {isEditMode && (
                                    <button onClick={() => openScheduleModal()} className="absolute bottom-10 right-10 w-20 h-20 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-all z-20 hover:bg-blue-700">
                                        <Icon name="plus" size={40} />
                                    </button>
                                )}
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-300 bg-slate-50">
                                <div className="w-32 h-32 bg-white rounded-[3rem] flex items-center justify-center shadow-inner mb-8 border border-slate-100"><Icon name="users" size={56} className="opacity-20 text-slate-400" /></div>
                                <p className="font-black text-xl text-slate-400 uppercase tracking-widest">학생 데이터를 먼저 선택해 주십시오</p>
                            </div>
                        )}
                    </main>

                    {/* 모달: 기존 로직 유지, 텍스트 크기 상향 */}
                    {detailModal.open && detailModal.item && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[150] p-6">
                            <div className="bg-white rounded-[3.5rem] w-full max-w-lg shadow-2xl overflow-hidden modal-animate border border-white/20">
                                <div className="h-40 relative" style={{ backgroundColor: detailModal.item.color }}>
                                    <button onClick={() => setDetailModal({ open: false, item: null })} className="absolute top-8 right-8 p-3 bg-black/20 text-white rounded-full transition-all hover:bg-black/40"><Icon name="x" size={24} /></button>
                                    <div className="absolute -bottom-8 left-12 bg-white p-5 rounded-[2rem] shadow-2xl border border-slate-50"><Icon name="bookmark" className="text-slate-800" size={32} /></div>
                                </div>
                                <div className="p-12 pt-16 space-y-10 text-slate-800">
                                    <div>
                                        <h3 className="text-4xl font-black mb-3 italic tracking-tight">{detailModal.item.title}</h3>
                                        <div className="flex flex-wrap gap-3">
                                            <span className="px-5 py-2 bg-slate-900 text-white rounded-xl text-[12px] font-black uppercase tracking-widest">{detailModal.item.tag}</span>
                                            {detailModal.item.days.map(d => <span key={d} className="px-5 py-2 bg-slate-100 rounded-xl text-[12px] font-black text-slate-600">{d}요일</span>)}
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 shadow-inner space-y-6">
                                        <div className="flex items-center gap-6">
                                            <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm text-slate-400 border border-slate-100"><Icon name="clock" size={28} /></div>
                                            <div className="text-3xl font-black italic tracking-tighter text-slate-700">{formatTime(detailModal.item.startH, detailModal.item.startM)} → {formatTime(detailModal.item.endH, detailModal.item.endM)}</div>
                                        </div>
                                        {detailModal.item.memo && (
                                            <div className="flex gap-6 pt-6 border-t border-slate-200">
                                                <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm text-slate-400 shrink-0 border border-slate-100"><Icon name="file-text" size={28} /></div>
                                                <p className="text-base font-bold text-slate-500 leading-relaxed pt-1">{detailModal.item.memo}</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => { openScheduleModal(detailModal.item); setDetailModal({ open: false, item: null }); setIsEditMode(true); }} className="flex-1 py-6 bg-slate-900 text-white rounded-3xl font-black shadow-xl active:scale-95 transition-all text-sm uppercase">수정 및 편집</button>
                                        <button onClick={() => { if(confirm("삭제하시겠습니까?")) { setStudents(prev => prev.map(s => s.id === selectedId ? {...s, schedules: s.schedules.filter(x => x.id !== detailModal.item.id)} : s)); setDetailModal({open: false, item: null}); } }} className="p-6 bg-red-50 text-red-500 rounded-3xl active:scale-95 transition-colors hover:bg-red-100"><Icon name="trash-2" size={28} /></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 활동 수립 모달 */}
                    {scheduleModal.open && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-xl flex items-center justify-center z-[200] p-6">
                            <div className="bg-white p-12 rounded-[3.5rem] w-full max-w-4xl shadow-2xl border border-white/20 modal-animate max-h-[95vh] overflow-y-auto custom-scrollbar font-sans">
                                <div className="flex justify-between items-center mb-12">
                                    <h3 className="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">{scheduleModal.editId ? "일정 수정" : "신규 활동 수립"}</h3>
                                    <button onClick={() => setScheduleModal({ open: false, editId: null })} className="text-slate-300 hover:text-slate-900 transition-colors"><Icon name="x" size={36} /></button>
                                </div>
                                <div className="space-y-12">
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 font-sans">
                                        <div className="space-y-5">
                                            <label className="text-sm font-black text-slate-400 uppercase tracking-widest ml-2 italic">활동 제목</label>
                                            <input type="text" className="w-full border-2 border-slate-100 p-7 rounded-[2rem] font-black outline-none focus:border-blue-500 transition-all bg-slate-50 shadow-inner text-2xl font-sans" value={sForm.title} onChange={e => setSForm({...sForm, title: e.target.value})} placeholder="활동 이름" />
                                        </div>
                                        <div className="space-y-5">
                                            <div className="flex justify-between items-center ml-2 font-sans"><label className="text-sm font-black text-slate-400 uppercase tracking-widest italic font-sans">분류 태그</label>
                                                <div className="flex gap-2 bg-white p-1.5 px-4 rounded-xl shadow-sm border border-slate-100 font-sans">
                                                    <input type="text" value={newTagInput} onChange={e => setNewTagInput(e.target.value)} placeholder="+ 추가" className="text-[12px] font-black outline-none w-24 font-sans" onKeyDown={e => e.key === 'Enter' && (setTags([...tags, newTagInput]), setSForm({...sForm, tag: newTagInput}), setNewTagInput(''))} />
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-3 p-6 bg-slate-50 rounded-[2rem] border border-slate-100 min-h-[110px] shadow-inner font-sans">
                                                {tags.map(t => <button key={t} onClick={() => setSForm({...sForm, tag: t})} className={`px-6 py-3 rounded-2xl text-[13px] font-black transition-all ${sForm.tag === t ? 'bg-slate-900 text-white shadow-xl' : 'bg-white text-slate-400 border border-slate-200 shadow-sm hover:border-slate-400 font-sans'}`}>{t}</button>)}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 font-sans">
                                        <div className="space-y-5">
                                            <label className="text-sm font-black text-slate-400 uppercase ml-2 tracking-widest italic font-sans">요일 배치</label>
                                            <div className="flex gap-2.5 bg-slate-100 p-3 rounded-[2rem] shadow-inner font-sans">
                                                {DAYS.map(d => <button key={d} onClick={() => {
                                                    const curr = sForm.days;
                                                    setSForm({...sForm, days: curr.includes(d) ? curr.filter(x => x !== d) : [...curr, d]});
                                                }} className={`flex-1 py-6 rounded-2xl text-sm font-black transition-all ${sForm.days.includes(d) ? 'bg-white text-slate-900 shadow-md scale-105' : 'text-slate-400 hover:text-slate-500 font-sans'}`}>{d}</button>)}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-10 font-sans">
                                            <div className="space-y-5 font-sans"><label className="text-sm font-black text-slate-400 uppercase ml-2 tracking-widest italic font-sans">시작 (HH:MM)</label>
                                                <div className="flex items-center gap-3 bg-slate-100 p-5 rounded-[2rem] shadow-inner font-sans">
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-2xl font-sans" value={sForm.startH} onChange={e => setSForm({...sForm, startH: e.target.value})} />
                                                    <span className="font-black text-slate-300 text-2xl">:</span>
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-2xl font-sans" value={sForm.startM} onChange={e => setSForm({...sForm, startM: e.target.value})} />
                                                </div>
                                            </div>
                                            <div className="space-y-5 font-sans"><label className="text-sm font-black text-slate-400 uppercase ml-2 tracking-widest italic font-sans">종료 (HH:MM)</label>
                                                <div className="flex items-center gap-3 bg-slate-100 p-5 rounded-[2rem] shadow-inner font-sans">
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-2xl font-sans" value={sForm.endH} onChange={e => setSForm({...sForm, endH: e.target.value})} />
                                                    <span className="font-black text-slate-300 text-2xl">:</span>
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-2xl font-sans" value={sForm.endM} onChange={e => setSForm({...sForm, endM: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 font-sans">
                                        <div className="space-y-5 font-sans">
                                            <label className="text-sm font-black text-slate-400 uppercase ml-2 tracking-widest italic font-sans">상세 메모</label>
                                            <textarea className="w-full border-2 border-slate-100 p-8 rounded-[2rem] font-bold outline-none focus:border-blue-500 bg-slate-50 shadow-inner h-44 resize-none transition-all font-sans text-lg" value={sForm.memo} onChange={e => setSForm({...sForm, memo: e.target.value})} placeholder="세부 활동 내역..." />
                                        </div>
                                        <div className="space-y-5 font-sans">
                                            <label className="text-sm font-black text-slate-400 uppercase ml-2 tracking-widest italic font-sans">색상 테마 선택</label>
                                            <div className="flex flex-wrap gap-4 bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 items-center shadow-inner font-sans">
                                                {[...DEFAULT_COLORS, ...customColors].map(c => (
                                                    <button key={c} onClick={() => setSForm({...sForm, color: c})} className={`w-12 h-12 rounded-full border-4 transition-all hover:scale-110 ${sForm.color === c ? 'border-slate-800 shadow-2xl scale-110' : 'border-white shadow-sm'}`} style={{ backgroundColor: c }} />
                                                ))}
                                                <div className="flex gap-3 items-center bg-white p-2.5 rounded-2xl border border-slate-200 shadow-sm ml-2 font-sans">
                                                    <div className="w-10 h-10 rounded-xl relative overflow-hidden border border-slate-100 cursor-pointer shadow-inner">
                                                        <input type="color" className="absolute -inset-2 cursor-pointer scale-150" value={tempColor} onChange={e => setTempColor(e.target.value)} />
                                                    </div>
                                                    <button onClick={() => { if(!customColors.includes(tempColor)) setCustomColors([...customColors, tempColor]); setSForm({...sForm, color: tempColor}); }} className="bg-slate-900 text-white p-3 rounded-xl hover:bg-slate-800 active:scale-90 transition-all shadow-md">
                                                        <Icon name="plus" size={20} />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-16 flex gap-6 font-sans">
                                    <button onClick={() => setScheduleModal({ open: false, editId: null })} className="flex-1 py-7 font-black text-slate-400 uppercase tracking-widest text-base italic hover:text-slate-600 transition-colors font-sans">변경 취소</button>
                                    <button onClick={handleSaveSchedule} className="flex-[3] py-7 bg-blue-600 text-white rounded-[2.5rem] font-black shadow-2xl shadow-blue-900/30 active:scale-95 transition-all text-2xl uppercase italic font-sans">일정 데이터 확정</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 학생 정보 모달 */}
                    {studentModal.open && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[300] p-6 font-sans">
                            <div className="bg-white p-12 rounded-[2.5rem] w-full max-w-sm shadow-2xl modal-animate border border-white/20 text-center font-sans">
                                <h3 className="text-3xl font-black mb-8 text-slate-800 tracking-tight uppercase font-sans font-sans">{studentModal.editId ? "이름 변경" : "학생 등록"}</h3>
                                <input type="text" value={studentModal.name} onChange={e => setStudentModal({...studentModal, name: e.target.value})} className="w-full border-2 border-slate-100 p-7 rounded-2xl outline-none focus:border-blue-500 font-black mb-10 transition-all bg-slate-50 shadow-inner text-2xl text-center font-sans" placeholder="이름" autoFocus onKeyDown={e => e.key === 'Enter' && handleSaveStudent()} />
                                <div className="flex gap-4">
                                    <button onClick={() => setStudentModal({ open: false, editId: null, name: '' })} className="flex-1 py-6 font-bold text-slate-400 hover:text-slate-600 transition-colors uppercase italic text-base font-sans">취소</button>
                                    <button onClick={handleSaveStudent} className="flex-[2] py-6 bg-slate-900 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-2xl uppercase tracking-tight font-sans">확정</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
