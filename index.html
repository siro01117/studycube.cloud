<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스터디큐브 통합 관리 시스템</title>
    <!-- 시스템 코어 엔진 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 이미지 변환 엔진 로드 -->
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: "Pretendard", sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-animate { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .dropdown-shadow { filter: drop-shadow(0 20px 25px rgba(0,0,0,0.15)); border: 1px solid #e2e8f0; }
        
        /* 타임테이블 고정 높이 슬롯 (12시간 가시성 확보) */
        .time-slot { height: 80px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 아이콘 물리 구현 엔진 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const pascalName = name.split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
            const iconData = lucide.icons[pascalName] || lucide.icons[name];
            
            if (!iconData) return null;
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}
                    dangerouslySetInnerHTML={{ __html: iconData.map(item => `<${item[0]} ${Object.entries(item[1]).map(([k, v]) => `${k}="${v}"`).join(' ')}></${item[0]}>`).join('') }}
                />
            );
        };

        const DAYS = ['월', '화', '수', '목', '금', '토', '일'];
        const START_HOUR = 7;
        const END_HOUR = 24;
        const SLOT_HEIGHT = 80; // 각 시간 칸의 높이 (px)
        const TOTAL_MINUTES = (END_HOUR - START_HOUR + 1) * 60;
        const DEFAULT_COLORS = ['#E59A9A', '#E5B981', '#DEE08C', '#A8D99C', '#8CCEDB', '#89AED9', '#A59BD9', '#D9A9D9', '#C2CDC9'];

        const App = () => {
            const captureAreaRef = useRef(null);

            // --- 데이터 영속성 계층 ---
            const [students, setStudents] = useState(() => {
                const saved = localStorage.getItem('studycube_v13_data');
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: '신규 학생', schedules: [], isDeleted: false }];
            });

            // --- UI 제어 계층 ---
            const [selectedId, setSelectedId] = useState(null);
            const [activeMenuId, setActiveMenuId] = useState(null); 
            const [isEditMode, setIsEditMode] = useState(false);
            const [showTrash, setShowTrash] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [filterTitle, setFilterTitle] = useState('');
            const [filterTag, setFilterTag] = useState('');

            // --- 모달 관리 시스템 ---
            const [studentModal, setStudentModal] = useState({ open: false, editId: null, name: '' });
            const [scheduleModal, setScheduleModal] = useState({ open: false, editId: null });
            const [detailModal, setDetailModal] = useState({ open: false, item: null });
            
            // --- 데이터 입력 버퍼 ---
            const [availableTags, setAvailableTags] = useState(['인강', '자습', '학원', '수업', '외부 활동']);
            const [newTagInput, setNewTagInput] = useState('');
            const [customColors, setCustomColors] = useState([]);
            const [tempColor, setTempColor] = useState('#3b82f6');

            const [scheduleForm, setScheduleForm] = useState({
                title: '', days: [], startH: '09', startM: '00', endH: '10', endM: '00', tag: '자습', memo: '', color: DEFAULT_COLORS[0]
            });

            useEffect(() => {
                localStorage.setItem('studycube_v13_data', JSON.stringify(students));
            }, [students]);

            const currentStudent = useMemo(() => students.find(s => s.id === selectedId), [students, selectedId]);
            const filteredStudents = students.filter(s => s.isDeleted === showTrash && s.name.includes(searchQuery));
            
            const filteredSchedules = useMemo(() => {
                if (!currentStudent) return [];
                return currentStudent.schedules.filter(s => 
                    s.title.toLowerCase().includes(filterTitle.toLowerCase()) && 
                    s.tag.toLowerCase().includes(filterTag.toLowerCase())
                );
            }, [currentStudent, filterTitle, filterTag]);

            const statistics = useMemo(() => {
                const total = filteredSchedules.reduce((acc, s) => {
                    const duration = (parseInt(s.endH)*60+parseInt(s.endM)) - (parseInt(s.startH)*60+parseInt(s.startM));
                    return acc + (duration * s.days.length);
                }, 0);
                return { total, avg: Math.round(total / 7) };
            }, [filteredSchedules]);

            // --- 이미지 출력 엔진 (Export) ---
            const handleExportImage = () => {
                if (!captureAreaRef.current || !currentStudent) return;
                
                // 캡처 시 가로 스크롤이나 요소 잘림 방지를 위해 스타일 임시 조정 로직이 포함됨
                html2canvas(captureAreaRef.current, {
                    backgroundColor: "#ffffff",
                    scale: 2, // 고해상도
                    useCORS: true,
                    logging: false,
                    windowWidth: captureAreaRef.current.scrollWidth,
                    windowHeight: captureAreaRef.current.scrollHeight
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${currentStudent.name}_주간계획표_스터디큐브.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            };

            // --- 학생 관리 로직 ---
            const handleSaveStudent = () => {
                if (!studentModal.name.trim()) return;
                if (studentModal.editId) {
                    setStudents(prev => prev.map(s => s.id === studentModal.editId ? { ...s, name: studentModal.name } : s));
                } else {
                    setStudents(prev => [...prev, { id: Date.now(), name: studentModal.name, schedules: [], isDeleted: false }]);
                }
                setStudentModal({ open: false, editId: null, name: '' });
                setActiveMenuId(null);
            };

            const handleToggleTrash = (id, deleted) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, isDeleted: deleted } : s));
                if (deleted && selectedId === id) setSelectedId(null);
                setActiveMenuId(null);
            };

            const handlePermanentDelete = (id) => {
                if(confirm("이 학생의 모든 기록을 영구 파괴하시겠습니까?")) {
                    setStudents(prev => prev.filter(s => s.id !== id));
                    setActiveMenuId(null);
                }
            };

            const openScheduleModal = (item = null) => {
                if (item) {
                    setScheduleForm({ ...item });
                    setScheduleModal({ open: true, editId: item.id });
                } else {
                    setScheduleForm({ title: '', days: [], startH: '09', startM: '00', endH: '10', endM: '00', tag: availableTags[0], memo: '', color: DEFAULT_COLORS[0] });
                    setScheduleModal({ open: true, editId: null });
                }
            };

            const handleSaveSchedule = () => {
                if (!scheduleForm.title || scheduleForm.days.length === 0) return;
                const start = parseInt(scheduleForm.startH)*60 + parseInt(scheduleForm.startM);
                const end = parseInt(scheduleForm.endH)*60 + parseInt(scheduleForm.endM);
                if (end <= start) { alert("종료 시간은 시작보다 늦어야 합니다."); return; }

                const newSchedules = scheduleModal.editId 
                    ? currentStudent.schedules.map(s => s.id === scheduleModal.editId ? { ...scheduleForm } : s)
                    : [...currentStudent.schedules, { ...scheduleForm, id: Date.now() }];
                
                setStudents(prev => prev.map(s => s.id === selectedId ? { ...s, schedules: newSchedules } : s));
                setScheduleModal({ open: false, editId: null });
            };

            const formatTime = (h, m) => `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

            return (
                <div className="flex h-screen w-full bg-slate-50 overflow-hidden font-sans" onClick={() => setActiveMenuId(null)}>
                    {/* 사이드바 - 목록 확장 */}
                    <aside className="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 z-30 shadow-sm">
                        <div className="p-6 border-b border-slate-100 bg-slate-50/30">
                            <div className="flex items-center gap-3 mb-6">
                                <div className="bg-blue-600 p-2 rounded-lg text-white"><Icon name="layout-dashboard" size={18} /></div>
                                <h1 className="text-lg font-black italic tracking-tighter uppercase text-slate-800">Study Cube</h1>
                            </div>
                            <button onClick={() => setStudentModal({ open: true, editId: null, name: '' })} className="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm text-white shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                <Icon name="user-plus" size={16} /> 학생 신규 등록
                            </button>
                        </div>
                        
                        <div className="px-4 py-3 flex gap-1 bg-slate-50/50">
                            <button onClick={() => setShowTrash(false)} className={`flex-1 py-2 rounded-lg text-[10px] font-black transition-all ${!showTrash ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-400'}`}>목록</button>
                            <button onClick={() => setShowTrash(true)} className={`flex-1 py-2 rounded-lg text-[10px] font-black transition-all ${showTrash ? 'bg-white text-red-600 shadow-sm border border-red-100' : 'text-slate-400'}`}>휴지통</button>
                        </div>

                        {/* 검색 및 학생 리스트 */}
                        <div className="p-4 space-y-2 border-b border-slate-100">
                             <div className="relative">
                                <Icon name="search" size={12} className="absolute left-3 top-2.5 text-slate-300" />
                                <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="검색..." className="w-full bg-slate-50 border border-slate-100 rounded-lg py-2 pl-8 pr-3 text-[11px] focus:ring-1 focus:ring-blue-400 outline-none font-bold" />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-3 space-y-1.5 custom-scrollbar">
                            {filteredStudents.map(s => (
                                <div key={s.id} onClick={() => !showTrash && setSelectedId(s.id)} className={`group p-3 rounded-xl cursor-pointer transition-all border flex items-center justify-between relative ${selectedId === s.id ? 'bg-blue-50 border-blue-100' : 'bg-white border-slate-100'}`}>
                                    <div className="truncate flex-1">
                                        <div className={`font-bold text-[13px] ${selectedId === s.id ? 'text-blue-700' : 'text-slate-700'}`}>{s.name}</div>
                                    </div>
                                    {!showTrash && (
                                        <button onClick={(e) => { e.stopPropagation(); setActiveMenuId(activeMenuId === s.id ? null : s.id); }} className="p-1 text-slate-300 hover:text-slate-500">
                                            <Icon name="more-vertical" size={14} />
                                        </button>
                                    )}
                                    {activeMenuId === s.id && (
                                        <div className="absolute right-0 top-10 bg-white rounded-xl shadow-2xl z-[100] p-1 w-32 border border-slate-100 animate-in fade-in zoom-in duration-150">
                                            <button onClick={(e) => { e.stopPropagation(); setStudentModal({ open: true, editId: s.id, name: s.name }); }} className="w-full flex items-center gap-2 px-2 py-2 text-[10px] font-bold text-slate-600 hover:bg-slate-50 rounded-lg">
                                                <Icon name="edit" size={12} /> 이름 변경
                                            </button>
                                            <button onClick={(e) => { e.stopPropagation(); handleToggleTrash(s.id, true); }} className="w-full flex items-center gap-2 px-2 py-2 text-[10px] font-bold text-red-500 hover:bg-red-50 rounded-lg">
                                                <Icon name="trash-2" size={12} /> 삭제
                                            </button>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>

                        {/* 일정 목록 요약창 (초기 기능 복원) */}
                        {selectedId && currentStudent && (
                            <div className="h-2/5 border-t border-slate-200 flex flex-col bg-white">
                                <div className="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="text-[11px] font-black text-slate-500 uppercase tracking-widest">일정 목록</h3>
                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">{filteredSchedules.length}개</span>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-1.5 custom-scrollbar">
                                    {filteredSchedules.length > 0 ? filteredSchedules.map(sched => (
                                        <div key={sched.id} onClick={() => setDetailModal({ open: true, item: sched })} className="p-2.5 rounded-lg border border-slate-50 hover:border-slate-200 transition-all cursor-pointer group">
                                            <div className="flex items-center gap-2 mb-1">
                                                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: sched.color }}></div>
                                                <div className="font-bold text-[11px] text-slate-700 truncate">{sched.title}</div>
                                            </div>
                                            <div className="flex justify-between items-center opacity-60 text-[9px] font-bold">
                                                <span>{sched.tag}</span>
                                                <span>{sched.days.join(', ')}</span>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="h-full flex items-center justify-center text-[10px] text-slate-300 font-bold">일정이 없습니다.</div>
                                    )}
                                </div>
                            </div>
                        )}
                    </aside>

                    {/* 메인 캔버스 - 가로 폭 최적화 및 캡처 영역 설정 */}
                    <main className="flex-1 flex flex-col relative bg-white overflow-hidden">
                        {currentStudent ? (
                            <>
                                <header className="h-20 border-b border-slate-100 flex items-center justify-between px-8 shrink-0 bg-white z-10">
                                    <div className="flex items-center gap-4">
                                        <div className="flex items-center gap-1.5 bg-slate-50 p-1 rounded-xl border border-slate-100">
                                            <input type="text" placeholder="제목 필터" value={filterTitle} onChange={e => setFilterTitle(e.target.value)} className="bg-transparent px-2 py-1 text-[10px] font-black outline-none border-r border-slate-200 w-24" />
                                            <input type="text" placeholder="태그 필터" value={filterTag} onChange={e => setFilterTag(e.target.value)} className="bg-transparent px-2 py-1 text-[10px] font-black outline-none w-24" />
                                        </div>
                                        <h2 className="text-lg font-black text-slate-800 tracking-tighter uppercase italic">{currentStudent.name} 시간표</h2>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button onClick={handleExportImage} className="flex items-center gap-2 px-5 py-2.5 bg-emerald-500 text-white rounded-xl font-black text-xs shadow-lg shadow-emerald-100 active:scale-95 transition-all">
                                            <Icon name="download" size={14} /> 이미지 저장
                                        </button>
                                        <button onClick={() => setIsEditMode(!isEditMode)} className={`flex items-center gap-2 px-6 py-2.5 rounded-xl font-black text-xs transition-all shadow-md ${isEditMode ? 'bg-slate-900 text-white shadow-xl' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                            <Icon name={isEditMode ? "check" : "edit-3"} size={14} /> {isEditMode ? '저장 종료' : '편집'}
                                        </button>
                                    </div>
                                </header>
                                
                                {/* 캡처 대상 영역 */}
                                <div className="flex-1 overflow-auto bg-slate-50/50 p-6 custom-scrollbar" id="capture-container">
                                    <div ref={captureAreaRef} className="bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-200 inline-block min-w-full">
                                        
                                        {/* 출력용 헤더 (화면에서는 히든 처리 가능하지만 캡처용으로 유지) */}
                                        <div className="mb-8 border-b-2 border-slate-900 pb-6 flex justify-between items-end">
                                            <div>
                                                <h1 className="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">{currentStudent.name} 주간 계획표</h1>
                                                <p className="text-sm font-bold text-slate-400 mt-1 uppercase tracking-widest">Weekly Operation Protocol</p>
                                            </div>
                                            <div className="text-right">
                                                <span className="text-slate-300 font-bold text-xs uppercase tracking-tighter">| 스터디큐브</span>
                                            </div>
                                        </div>

                                        <div className="flex gap-6">
                                            {/* 일정 요약 리스트 (출력용) */}
                                            <div className="w-64 shrink-0 space-y-4">
                                                <div className="bg-slate-900 text-white p-4 rounded-2xl">
                                                    <h3 className="text-[10px] font-black uppercase tracking-widest opacity-50 mb-3">Statistics</h3>
                                                    <div className="space-y-4">
                                                        <div>
                                                            <p className="text-[9px] font-bold opacity-70 uppercase">Weekly Total</p>
                                                            <p className="text-xl font-black tracking-tighter">{Math.floor(statistics.total/60)}시간 {statistics.total%60}분</p>
                                                        </div>
                                                        <div>
                                                            <p className="text-[9px] font-bold opacity-70 uppercase">Daily Avg</p>
                                                            <p className="text-xl font-black tracking-tighter text-blue-400">{Math.floor(statistics.avg/60)}시간 {statistics.avg%60}분</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="space-y-2">
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Activity Index</h3>
                                                    {filteredSchedules.map(sched => (
                                                        <div key={sched.id} className="p-3 rounded-xl border border-slate-100 flex items-start gap-3">
                                                            <div className="w-1.5 h-10 rounded-full shrink-0" style={{ backgroundColor: sched.color }}></div>
                                                            <div className="overflow-hidden">
                                                                <p className="font-black text-[11px] text-slate-800 truncate">{sched.title}</p>
                                                                <p className="text-[9px] font-bold text-slate-400 mt-1">{sched.startH}:{sched.startM} - {sched.endH}:{sched.endM}</p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* 타임테이블 - 수직 확장 버전 */}
                                            <div className="flex-1 grid grid-cols-8 divide-x divide-slate-100 border border-slate-100 rounded-3xl overflow-hidden shadow-inner">
                                                <div className="bg-slate-50/50 flex flex-col">
                                                    <div className="h-14 border-b border-slate-100 flex items-center justify-center text-[9px] font-black text-slate-400 tracking-widest uppercase bg-white">TIME</div>
                                                    {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                                                        <div key={i} className="time-slot flex items-start justify-center pt-3 text-[10px] font-black text-slate-300">
                                                            {START_HOUR + i < 24 ? START_HOUR + i : START_HOUR + i - 24}:00
                                                        </div>
                                                    ))}
                                                </div>
                                                {DAYS.map(day => (
                                                    <div key={day} className="flex flex-col relative group min-w-[100px]">
                                                        <div className="h-14 border-b border-slate-100 flex items-center justify-center text-xs font-black text-slate-500 bg-white uppercase tracking-tighter">{day}</div>
                                                        <div className="flex-1 relative bg-white/50">
                                                            {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                                                                <div key={i} className="time-slot"></div>
                                                            ))}
                                                            {filteredSchedules.filter(a => a.days.includes(day)).map(a => {
                                                                const start = (parseInt(a.startH) * 60 + parseInt(a.startM)) - (START_HOUR * 60);
                                                                const dur = (parseInt(a.endH) * 60 + parseInt(a.endM)) - (parseInt(a.startH) * 60 + parseInt(a.startM));
                                                                // 전체 높이 = (시간 개수) * SLOT_HEIGHT
                                                                const totalH = (END_HOUR - START_HOUR + 1) * SLOT_HEIGHT;
                                                                const topPos = (start / TOTAL_MINUTES) * totalH;
                                                                const blockH = (dur / TOTAL_MINUTES) * totalH;
                                                                
                                                                return (
                                                                    <div key={a.id} onClick={() => isEditMode ? openScheduleModal(a) : setDetailModal({ open: true, item: a })} className={`absolute left-1 right-1 rounded-xl p-2.5 text-[10px] font-black shadow-lg border border-black/5 flex flex-col justify-between overflow-hidden transition-all hover:scale-[1.02] hover:z-10 cursor-pointer ${isEditMode ? 'ring-2 ring-blue-500 ring-offset-2' : ''}`}
                                                                        style={{ top: `${topPos}px`, height: `${blockH}px`, backgroundColor: a.color }}>
                                                                        <div className="flex justify-between items-start">
                                                                            <span className="truncate leading-tight uppercase">{a.title}</span>
                                                                        </div>
                                                                        {blockH > 35 && <span className="opacity-40 text-[8px] font-bold tracking-tighter">{formatTime(a.startH, a.startM)}</span>}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {isEditMode && (
                                    <button onClick={() => openScheduleModal()} className="absolute bottom-10 right-10 w-16 h-16 bg-blue-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-all z-20">
                                        <Icon name="plus" size={32} />
                                    </button>
                                )}
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center text-slate-300 bg-slate-50">
                                <div className="w-32 h-32 bg-white rounded-[3rem] flex items-center justify-center shadow-inner mb-8 border border-slate-100"><Icon name="users" size={56} className="opacity-20 text-slate-400" /></div>
                                <p className="font-black text-xl text-slate-400 uppercase tracking-widest">관리할 학생 데이터를 선택하세요</p>
                            </div>
                        )}
                    </main>

                    {/* 상세 활동 정보 모달 */}
                    {detailModal.open && detailModal.item && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[150] p-6 font-sans">
                            <div className="bg-white rounded-[3.5rem] w-full max-w-lg shadow-2xl overflow-hidden modal-animate border border-white/20">
                                <div className="h-40 relative" style={{ backgroundColor: detailModal.item.color }}>
                                    <button onClick={() => setDetailModal({ open: false, item: null })} className="absolute top-8 right-8 p-2.5 bg-black/20 text-white rounded-full transition-all hover:bg-black/40"><Icon name="x" size={24} /></button>
                                    <div className="absolute -bottom-8 left-12 bg-white p-5 rounded-[2rem] shadow-2xl border border-slate-50"><Icon name="bookmark" className="text-slate-800" size={32} /></div>
                                </div>
                                <div className="p-12 pt-16 space-y-10 text-slate-800">
                                    <div>
                                        <h3 className="text-3xl font-black mb-3 italic tracking-tight">{detailModal.item.title}</h3>
                                        <div className="flex flex-wrap gap-2">
                                            <span className="px-4 py-1.5 bg-slate-900 text-white rounded-xl text-[11px] font-black uppercase tracking-widest">{detailModal.item.tag}</span>
                                            {detailModal.item.days.map(d => <span key={d} className="px-4 py-1.5 bg-slate-100 rounded-xl text-[11px] font-black text-slate-600">{d}요일</span>)}
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 shadow-inner space-y-6">
                                        <div className="flex items-center gap-6">
                                            <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-slate-400 border border-slate-100"><Icon name="clock" size={24} /></div>
                                            <div className="text-2xl font-black italic tracking-tighter text-slate-700">{formatTime(detailModal.item.startH, detailModal.item.startM)} → {formatTime(detailModal.item.endH, detailModal.item.endM)}</div>
                                        </div>
                                        {detailModal.item.memo && (
                                            <div className="flex gap-6 pt-6 border-t border-slate-200">
                                                <div className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm text-slate-400 shrink-0 border border-slate-100"><Icon name="file-text" size={24} /></div>
                                                <p className="text-sm font-bold text-slate-500 leading-relaxed pt-1">{detailModal.item.memo}</p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => { openScheduleModal(detailModal.item); setDetailModal({ open: false, item: null }); setIsEditMode(true); }} className="flex-1 py-5 bg-slate-900 text-white rounded-3xl font-black shadow-xl active:scale-95 transition-all text-sm uppercase">내용 수정 및 편집</button>
                                        <button onClick={() => { if(confirm("이 활동을 삭제하시겠습니까?")) { setStudents(prev => prev.map(s => s.id === selectedId ? {...s, schedules: s.schedules.filter(x => x.id !== detailModal.item.id)} : s)); setDetailModal({open: false, item: null}); } }} className="p-5 bg-red-50 text-red-500 rounded-3xl active:scale-95 transition-colors hover:bg-red-100"><Icon name="trash-2" size={24} /></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 활동 수립 모달 */}
                    {scheduleModal.open && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-xl flex items-center justify-center z-[200] p-6">
                            <div className="bg-white p-12 rounded-[3.5rem] w-full max-w-4xl shadow-2xl border border-white/20 modal-animate max-h-[95vh] overflow-y-auto custom-scrollbar font-sans">
                                <div className="flex justify-between items-center mb-12">
                                    <h3 className="text-3xl font-black text-slate-800 tracking-tighter uppercase italic">{scheduleModal.editId ? "상세 일정 수정" : "신규 활동 수립"}</h3>
                                    <button onClick={() => setScheduleModal({ open: false, editId: null })} className="text-slate-300 hover:text-slate-900 transition-colors"><Icon name="x" size={32} /></button>
                                </div>
                                <div className="space-y-12">
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                        <div className="space-y-4">
                                            <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-2">활동 제목</label>
                                            <input type="text" className="w-full border-2 border-slate-100 p-6 rounded-[2rem] font-black outline-none focus:border-blue-500 transition-all bg-slate-50 shadow-inner text-xl font-sans" value={scheduleForm.title} onChange={e => setScheduleForm({...scheduleForm, title: e.target.value})} placeholder="활동명을 입력하세요" />
                                        </div>
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center ml-2"><label className="text-xs font-black text-slate-400 uppercase tracking-widest font-sans">분류 태그</label>
                                                <div className="flex gap-2 bg-white p-1.5 px-3 rounded-xl shadow-sm border border-slate-100">
                                                    <input type="text" value={newTagInput} onChange={e => setNewTagInput(e.target.value)} placeholder="+ 태그 추가" className="text-[11px] font-black outline-none w-24 font-sans" onKeyDown={e => e.key === 'Enter' && (setAvailableTags([...availableTags, newTagInput]), setScheduleForm({...scheduleForm, tag: newTagInput}), setNewTagInput(''))} />
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-2.5 p-6 bg-slate-50 rounded-[2rem] border border-slate-100 min-h-[100px] shadow-inner">
                                                {availableTags.map(t => <button key={t} onClick={() => setScheduleForm({...scheduleForm, tag: t})} className={`px-5 py-2.5 rounded-2xl text-[11px] font-black transition-all ${scheduleForm.tag === t ? 'bg-slate-900 text-white shadow-xl' : 'bg-white text-slate-400 border border-slate-200 shadow-sm hover:border-slate-400 font-sans'}`}>{t}</button>)}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                        <div className="space-y-4">
                                            <label className="text-xs font-black text-slate-400 uppercase ml-2 tracking-widest font-sans">요일 배치</label>
                                            <div className="flex gap-2 bg-slate-100 p-2.5 rounded-[2rem] shadow-inner font-sans">
                                                {DAYS.map(d => <button key={d} onClick={() => {
                                                    const curr = scheduleForm.days;
                                                    setScheduleForm({...scheduleForm, days: curr.includes(d) ? curr.filter(x => x !== d) : [...curr, d]});
                                                }} className={`flex-1 py-5 rounded-2xl text-xs font-black transition-all ${scheduleForm.days.includes(d) ? 'bg-white text-slate-900 shadow-md scale-105 font-sans' : 'text-slate-400 hover:text-slate-500 font-sans'}`}>{d}</button>)}
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-8 font-sans">
                                            <div className="space-y-4"><label className="text-xs font-black text-slate-400 uppercase ml-2 tracking-widest font-sans">시작 (HH:MM)</label>
                                                <div className="flex items-center gap-2 bg-slate-100 p-4 rounded-[2rem] shadow-inner font-sans">
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-xl font-sans" value={scheduleForm.startH} onChange={e => setScheduleForm({...scheduleForm, startH: e.target.value})} />
                                                    <span className="font-black text-slate-300">:</span>
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-xl font-sans" value={scheduleForm.startM} onChange={e => setScheduleForm({...scheduleForm, startM: e.target.value})} />
                                                </div>
                                            </div>
                                            <div className="space-y-4"><label className="text-xs font-black text-slate-400 uppercase ml-2 tracking-widest font-sans">종료 (HH:MM)</label>
                                                <div className="flex items-center gap-2 bg-slate-100 p-4 rounded-[2rem] shadow-inner font-sans">
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-xl font-sans" value={scheduleForm.endH} onChange={e => setScheduleForm({...scheduleForm, endH: e.target.value})} />
                                                    <span className="font-black text-slate-300">:</span>
                                                    <input type="text" maxLength="2" className="w-full bg-transparent text-center font-black outline-none text-xl font-sans" value={scheduleForm.endM} onChange={e => setScheduleForm({...scheduleForm, endM: e.target.value})} />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 font-sans">
                                        <div className="space-y-4 font-sans">
                                            <label className="text-xs font-black text-slate-400 uppercase ml-2 tracking-widest font-sans">상세 메모</label>
                                            <textarea className="w-full border-2 border-slate-100 p-6 rounded-[2rem] font-bold outline-none focus:border-blue-500 bg-slate-50 shadow-inner h-36 resize-none transition-all font-sans" value={scheduleForm.memo} onChange={e => setScheduleForm({...scheduleForm, memo: e.target.value})} placeholder="상세 활동 내역을 기록하십시오..." />
                                        </div>
                                        <div className="space-y-4 font-sans">
                                            <label className="text-xs font-black text-slate-400 uppercase ml-2 tracking-widest font-sans">색상 테마 선택</label>
                                            <div className="flex flex-wrap gap-4 bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100 items-center shadow-inner">
                                                {[...DEFAULT_COLORS, ...customColors].map(c => (
                                                    <button key={c} onClick={() => setScheduleForm({...scheduleForm, color: c})} className={`w-11 h-11 rounded-full border-4 transition-all hover:scale-110 ${scheduleForm.color === c ? 'border-slate-800 shadow-2xl scale-110' : 'border-white shadow-sm'}`} style={{ backgroundColor: c }} />
                                                ))}
                                                <div className="flex gap-2 items-center bg-white p-2.5 rounded-2xl border border-slate-200 shadow-sm ml-2">
                                                    <div className="w-9 h-9 rounded-xl relative overflow-hidden border border-slate-100 cursor-pointer shadow-inner">
                                                        <input type="color" className="absolute -inset-2 cursor-pointer scale-150" value={tempColor} onChange={e => setTempColor(e.target.value)} />
                                                    </div>
                                                    <button onClick={() => { if(!customColors.includes(tempColor)) setCustomColors([...customColors, tempColor]); setScheduleForm({...scheduleForm, color: tempColor}); }} className="bg-slate-900 text-white p-2.5 rounded-xl hover:bg-slate-800 active:scale-90 transition-all shadow-md font-sans">
                                                        <Icon name="plus" size={18} />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-16 flex gap-6">
                                    <button onClick={() => setScheduleModal({ open: false, editId: null })} className="flex-1 py-6 font-black text-slate-400 uppercase tracking-widest text-sm italic hover:text-slate-600 transition-colors">변경 취소</button>
                                    <button onClick={handleSaveSchedule} className="flex-[3] py-6 bg-blue-600 text-white rounded-[2.5rem] font-black shadow-2xl shadow-blue-200 active:scale-95 transition-all text-xl uppercase">일정 데이터 확정</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 학생 정보 모달 */}
                    {studentModal.open && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-[300] p-6">
                            <div className="bg-white p-10 rounded-[2.5rem] w-full max-w-sm shadow-2xl modal-animate border border-white/20 text-center">
                                <h3 className="text-2xl font-black mb-8 text-slate-800 tracking-tight uppercase">{studentModal.editId ? "정보 수정" : "학생 신규 등록"}</h3>
                                <input type="text" value={studentModal.name} onChange={e => setStudentModal({...studentModal, name: e.target.value})} className="w-full border-2 border-slate-100 p-5 rounded-2xl outline-none focus:border-blue-500 font-black mb-10 transition-all bg-slate-50 shadow-inner text-lg text-center" placeholder="이름 입력" autoFocus onKeyDown={e => e.key === 'Enter' && handleSaveStudent()} />
                                <div className="flex gap-4 font-sans">
                                    <button onClick={() => setStudentModal({ open: false, editId: null, name: '' })} className="flex-1 py-5 font-bold text-slate-400 hover:text-slate-600 transition-colors uppercase italic text-sm">취소</button>
                                    <button onClick={handleSaveStudent} className="flex-[2] py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl active:scale-95 transition-all text-lg uppercase tracking-tight">확인</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
