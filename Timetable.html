<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script type="text/babel" src="Auth.js"></script>
    <script type="text/babel" src="Export.js"></script>
</head>

    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700; font-display: block;
        }
        body { 
            margin: 0; 
            font-family: 'Pretendard', sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: #f1f5f9;
        }

        /* [Significance: A4 정밀 캡처를 위한 물리적 캔버스] */
        .export-area { 
            width: 1100px !important;       /* 7일 체제에 최적화된 너비 */
            min-height: 1555px !important;  /* A4 비율(1:1.414) 준수 */
            background: white !important;
            margin: 0 auto;
            position: relative;
            box-sizing: border-box !important;
            padding: 60px !important;       /* 출력 시 여백 확보 */
        }

        /* [핵심 연산: 에브리타임 스타일 7일 그리드] */
        .grid-layout { 
            display: grid !important; 
            grid-template-columns: 60px repeat(7, 1fr) !important; /* 시간축 + 월~일 */
            border: 2px solid #1e293b;
            border-radius: 20px;
            overflow: hidden;
        }

        /* 시간 슬롯 높이 연산 (Timetable.js의 SLOT_HEIGHT와 동기화) */
        .time-slot { 
            height: 80px; 
            border-bottom: 1px solid #f1f5f9; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            color: #cbd5e1;
        }

        /* 캡처 시 불필요한 UI 숨김 프로토콜 */
        @media print {
            .no-print { display: none !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="Auth.js"></script>
    <script type="text/babel" src="Export.js"></script>
    
    <script type="text/babel" src="Timetable.js"></script>
</body>
</html>
