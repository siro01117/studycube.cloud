<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>STUDY CUBE :: Integrated System</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script> 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700; font-display: block;
        }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        .export-area { width: 1100px !important; min-height: 1555px !important; background: white !important; margin: 0 auto; position: relative; box-sizing: border-box !important; padding: 60px !important; }
        .grid-layout { display: grid !important; grid-template-columns: 60px repeat(7, 1fr) !important; border: 2px solid #1e293b; border-radius: 20px; overflow: hidden; }
        @media print { .no-print { display: none !important; } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="Auth.js"></script>
    <script type="text/babel" src="Export.js"></script>
    
    <script type="text/babel" src="Timetable.js"></script>
</body>
</html>
