<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDY CUBE :: Management System</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* 시스템 공통 스타일 */
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2');
            font-weight: 700; font-display: block;
        }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f8fafc; overflow: hidden; }
        
        /* 캡처 시 레이아웃 고정을 위한 물리적 규격 */
        .export-area { 
            width: 1700px !important; 
            min-width: 1700px !important; 
            background: white !important; 
            padding: 60px !important; 
            box-sizing: border-box !important;
        }
        
        /* 시간표 그리드 레이아웃 */
        .grid-layout { display: grid !important; grid-template-columns: 0.7fr repeat(7, 1fr) !important; }
        .time-slot { height: 100px; border-bottom: 1px solid #f1f5f9; }
        
        /* 스크롤바 커스텀 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e1e22; border-radius: 10px; }
        
        /* 애니메이션 */
        .modal-animate { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="Auth.js"></script>
    <script type="text/babel" src="Export.js"></script>
    <script type="text/babel" src="Timetable.js"></script>
</body>
</html>
